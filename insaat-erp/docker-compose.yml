services:
  # ── Backend API ──
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://erp:erp_pass@postgres:5432/insaat_erp
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - DEBUG=true
      - CORS_ORIGINS=["http://localhost:3000","http://18.185.82.118:3000","http://localhost:8081"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    command: sh /app/entrypoint.sh

  # ── Web Frontend (Next.js) ──
  web:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://18.185.82.118:8000/api/v1
      - HOSTNAME=0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    depends_on:
      - backend

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=insaat_erp
      - POSTGRES_USER=erp
      - POSTGRES_PASSWORD=erp_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U erp -d insaat_erp" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ── MinIO (Dosya Depolama) ──
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  pgdata:
  minio_data:
